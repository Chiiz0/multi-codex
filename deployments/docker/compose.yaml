services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_codex}
      POSTGRES_USER: ${POSTGRES_USER:-multi_codex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: multi-codex/api:latest
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MULTICODEX_API_LISTEN: ":8080"
      MULTICODEX_DATABASE_URL: postgres://${POSTGRES_USER:-multi_codex}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-multi_codex}?sslmode=disable
      MULTICODEX_ARTIFACT_ROOT: /var/lib/multi-codex/artifacts
      MULTICODEX_RUN_ROOT: /var/lib/multi-codex/runs
      MULTICODEX_WORKTREE_ROOT: /var/lib/multi-codex/worktrees
      MULTICODEX_REPO_CACHE_ROOT: /var/lib/multi-codex/repos
      MULTICODEX_AGENTD_URL: http://worker-agentd:7070
      MULTICODEX_AGENTD_TOKEN: ${MULTICODEX_AGENTD_TOKEN:-}
      MULTICODEX_AUTH_MODE: ${MULTICODEX_AUTH_MODE:-local}
      MULTICODEX_AUTH_SESSION_TTL: ${MULTICODEX_AUTH_SESSION_TTL:-12h}
      MULTICODEX_AUTH_COOKIE_SECURE: ${MULTICODEX_AUTH_COOKIE_SECURE:-false}
      MULTICODEX_AUTH_LOGIN_STATE_TTL: ${MULTICODEX_AUTH_LOGIN_STATE_TTL:-10m}
      MULTICODEX_OIDC_ISSUER: ${MULTICODEX_OIDC_ISSUER:-}
      MULTICODEX_OIDC_AUDIENCE: ${MULTICODEX_OIDC_AUDIENCE:-}
      MULTICODEX_OIDC_JWKS_URL: ${MULTICODEX_OIDC_JWKS_URL:-}
      MULTICODEX_OIDC_CLIENT_ID: ${MULTICODEX_OIDC_CLIENT_ID:-}
      MULTICODEX_OIDC_CLIENT_SECRET: ${MULTICODEX_OIDC_CLIENT_SECRET:-}
      MULTICODEX_OIDC_CLIENT_AUTH_METHOD: ${MULTICODEX_OIDC_CLIENT_AUTH_METHOD:-client_secret_post}
      MULTICODEX_OIDC_REDIRECT_URL: ${MULTICODEX_OIDC_REDIRECT_URL:-http://localhost:8080/api/v1/auth/callback}
      MULTICODEX_OIDC_AUTHORIZATION_URL: ${MULTICODEX_OIDC_AUTHORIZATION_URL:-}
      MULTICODEX_OIDC_TOKEN_URL: ${MULTICODEX_OIDC_TOKEN_URL:-}
      MULTICODEX_OIDC_POST_LOGIN_REDIRECT_URL: ${MULTICODEX_OIDC_POST_LOGIN_REDIRECT_URL:-/}
      MULTICODEX_OIDC_DEFAULT_ROLE: ${MULTICODEX_OIDC_DEFAULT_ROLE:-viewer}
      MULTICODEX_OIDC_DEFAULT_ORG_ID: ${MULTICODEX_OIDC_DEFAULT_ORG_ID:-}
      MULTICODEX_OIDC_GROUP_ROLE_MAP: ${MULTICODEX_OIDC_GROUP_ROLE_MAP:-}
      MULTICODEX_OIDC_GROUP_ORG_MAP: ${MULTICODEX_OIDC_GROUP_ORG_MAP:-}
      MULTICODEX_EXECUTOR_MODE: ${MULTICODEX_EXECUTOR_MODE:-mock}
      MULTICODEX_WORKER_IMAGE: ${MULTICODEX_WORKER_IMAGE:-multi-codex/codex-worker:go1.25-node-vite8}
      MULTICODEX_WORKER_DEFAULT_TIMEOUT: ${MULTICODEX_WORKER_DEFAULT_TIMEOUT:-1h}
      MULTICODEX_WORKER_SECRET_ENV_ALLOWLIST: ${MULTICODEX_WORKER_SECRET_ENV_ALLOWLIST:-}
      MULTICODEX_WORKER_SECRET_PROVIDER: ${MULTICODEX_WORKER_SECRET_PROVIDER:-env}
      MULTICODEX_WORKER_SECRET_FILE_PATH: ${MULTICODEX_WORKER_SECRET_FILE_PATH:-}
      MULTICODEX_WORKER_VAULT_ADDR: ${MULTICODEX_WORKER_VAULT_ADDR:-}
      MULTICODEX_WORKER_VAULT_TOKEN: ${MULTICODEX_WORKER_VAULT_TOKEN:-}
      MULTICODEX_WORKER_VAULT_TOKEN_FILE: ${MULTICODEX_WORKER_VAULT_TOKEN_FILE:-}
      MULTICODEX_WORKER_VAULT_NAMESPACE: ${MULTICODEX_WORKER_VAULT_NAMESPACE:-}
      MULTICODEX_WORKER_VAULT_MOUNT: ${MULTICODEX_WORKER_VAULT_MOUNT:-secret}
      MULTICODEX_WORKER_VAULT_SECRET_PATH: ${MULTICODEX_WORKER_VAULT_SECRET_PATH:-}
      MULTICODEX_QUEUE_ENABLED: ${MULTICODEX_QUEUE_ENABLED:-true}
      MULTICODEX_QUEUE_DISPATCH_INTERVAL: ${MULTICODEX_QUEUE_DISPATCH_INTERVAL:-5s}
      MULTICODEX_TELEMETRY_PUSH_URL: ${MULTICODEX_TELEMETRY_PUSH_URL:-}
      MULTICODEX_TELEMETRY_PUSH_INTERVAL: ${MULTICODEX_TELEMETRY_PUSH_INTERVAL:-1m}
      MULTICODEX_AUDIT_EXPORT_PATH: ${MULTICODEX_AUDIT_EXPORT_PATH:-}
      MULTICODEX_AUDIT_SHIP_ENABLED: ${MULTICODEX_AUDIT_SHIP_ENABLED:-false}
      MULTICODEX_AUDIT_SHIP_INTERVAL: ${MULTICODEX_AUDIT_SHIP_INTERVAL:-24h}
      MULTICODEX_AUDIT_SEAL_ROOT: ${MULTICODEX_AUDIT_SEAL_ROOT:-/var/lib/multi-codex/audit-seals/scheduled}
      MULTICODEX_AUDIT_SHIP_TARGET: ${MULTICODEX_AUDIT_SHIP_TARGET:-}
      MULTICODEX_AUDIT_SHIP_ALLOW_LEGACY_HASH_MISMATCH: ${MULTICODEX_AUDIT_SHIP_ALLOW_LEGACY_HASH_MISMATCH:-false}
      MULTICODEX_AUDIT_SHIP_S3_REGION: ${MULTICODEX_AUDIT_SHIP_S3_REGION:-}
      MULTICODEX_AUDIT_SHIP_S3_ENDPOINT: ${MULTICODEX_AUDIT_SHIP_S3_ENDPOINT:-}
      MULTICODEX_AUDIT_SHIP_S3_OBJECT_LOCK_MODE: ${MULTICODEX_AUDIT_SHIP_S3_OBJECT_LOCK_MODE:-}
      MULTICODEX_AUDIT_SHIP_S3_OBJECT_LOCK_RETAIN_UNTIL: ${MULTICODEX_AUDIT_SHIP_S3_OBJECT_LOCK_RETAIN_UNTIL:-}
      MULTICODEX_AUDIT_SHIP_S3_OBJECT_LOCK_LEGAL_HOLD: ${MULTICODEX_AUDIT_SHIP_S3_OBJECT_LOCK_LEGAL_HOLD:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      MULTICODEX_GIT_SYNC_MODE: ${MULTICODEX_GIT_SYNC_MODE:-dry-run}
      MULTICODEX_GIT_CREDENTIAL_PROVIDER: ${MULTICODEX_GIT_CREDENTIAL_PROVIDER:-env}
      MULTICODEX_GIT_CREDENTIAL_FILE_PATH: ${MULTICODEX_GIT_CREDENTIAL_FILE_PATH:-}
      MULTICODEX_GIT_VAULT_ADDR: ${MULTICODEX_GIT_VAULT_ADDR:-}
      MULTICODEX_GIT_VAULT_TOKEN: ${MULTICODEX_GIT_VAULT_TOKEN:-}
      MULTICODEX_GIT_VAULT_TOKEN_FILE: ${MULTICODEX_GIT_VAULT_TOKEN_FILE:-}
      MULTICODEX_GIT_VAULT_NAMESPACE: ${MULTICODEX_GIT_VAULT_NAMESPACE:-}
      MULTICODEX_GIT_VAULT_MOUNT: ${MULTICODEX_GIT_VAULT_MOUNT:-secret}
      MULTICODEX_GIT_VAULT_SECRET_PATH: ${MULTICODEX_GIT_VAULT_SECRET_PATH:-}
      MULTICODEX_GITHUB_API_URL: ${MULTICODEX_GITHUB_API_URL:-https://api.github.com}
      MULTICODEX_GITLAB_API_URL: ${MULTICODEX_GITLAB_API_URL:-https://gitlab.com/api/v4}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
    volumes:
      - artifacts:/var/lib/multi-codex/artifacts
      - runs:/var/lib/multi-codex/runs
      - worktrees:/var/lib/multi-codex/worktrees
      - repo_cache:/var/lib/multi-codex/repos
      - audit_seals:/var/lib/multi-codex/audit-seals
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"

  mcp-gateway:
    image: multi-codex/api:latest
    command: ["/usr/local/bin/multi-codex-mcp-gateway"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MULTICODEX_MCP_LISTEN: ":8090"
      MULTICODEX_MCP_SESSION_TTL: ${MULTICODEX_MCP_SESSION_TTL:-8h}
      MULTICODEX_MCP_LIVE_FANOUT_INTERVAL: ${MULTICODEX_MCP_LIVE_FANOUT_INTERVAL:-1s}
      MULTICODEX_DATABASE_URL: postgres://${POSTGRES_USER:-multi_codex}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-multi_codex}?sslmode=disable
      MULTICODEX_RUN_ROOT: /var/lib/multi-codex/runs
      MULTICODEX_AGENTD_URL: http://worker-agentd:7070
      MULTICODEX_AGENTD_TOKEN: ${MULTICODEX_AGENTD_TOKEN:-}
      MULTICODEX_AUTH_MODE: ${MULTICODEX_AUTH_MODE:-local}
      MULTICODEX_OIDC_ISSUER: ${MULTICODEX_OIDC_ISSUER:-}
      MULTICODEX_OIDC_AUDIENCE: ${MULTICODEX_OIDC_AUDIENCE:-}
      MULTICODEX_OIDC_JWKS_URL: ${MULTICODEX_OIDC_JWKS_URL:-}
      MULTICODEX_OIDC_DEFAULT_ROLE: ${MULTICODEX_OIDC_DEFAULT_ROLE:-viewer}
      MULTICODEX_OIDC_DEFAULT_ORG_ID: ${MULTICODEX_OIDC_DEFAULT_ORG_ID:-}
      MULTICODEX_OIDC_GROUP_ROLE_MAP: ${MULTICODEX_OIDC_GROUP_ROLE_MAP:-}
      MULTICODEX_OIDC_GROUP_ORG_MAP: ${MULTICODEX_OIDC_GROUP_ORG_MAP:-}
      MULTICODEX_EXECUTOR_MODE: ${MULTICODEX_EXECUTOR_MODE:-mock}
      MULTICODEX_WORKER_IMAGE: ${MULTICODEX_WORKER_IMAGE:-multi-codex/codex-worker:go1.25-node-vite8}
      MULTICODEX_WORKER_DEFAULT_TIMEOUT: ${MULTICODEX_WORKER_DEFAULT_TIMEOUT:-1h}
      MULTICODEX_WORKER_SECRET_ENV_ALLOWLIST: ${MULTICODEX_WORKER_SECRET_ENV_ALLOWLIST:-}
      MULTICODEX_WORKER_SECRET_PROVIDER: ${MULTICODEX_WORKER_SECRET_PROVIDER:-env}
      MULTICODEX_WORKER_SECRET_FILE_PATH: ${MULTICODEX_WORKER_SECRET_FILE_PATH:-}
      MULTICODEX_WORKER_VAULT_ADDR: ${MULTICODEX_WORKER_VAULT_ADDR:-}
      MULTICODEX_WORKER_VAULT_TOKEN: ${MULTICODEX_WORKER_VAULT_TOKEN:-}
      MULTICODEX_WORKER_VAULT_TOKEN_FILE: ${MULTICODEX_WORKER_VAULT_TOKEN_FILE:-}
      MULTICODEX_WORKER_VAULT_NAMESPACE: ${MULTICODEX_WORKER_VAULT_NAMESPACE:-}
      MULTICODEX_WORKER_VAULT_MOUNT: ${MULTICODEX_WORKER_VAULT_MOUNT:-secret}
      MULTICODEX_WORKER_VAULT_SECRET_PATH: ${MULTICODEX_WORKER_VAULT_SECRET_PATH:-}
      MULTICODEX_TELEMETRY_PUSH_URL: ${MULTICODEX_TELEMETRY_PUSH_URL:-}
      MULTICODEX_TELEMETRY_PUSH_INTERVAL: ${MULTICODEX_TELEMETRY_PUSH_INTERVAL:-1m}
      MULTICODEX_AUDIT_EXPORT_PATH: ${MULTICODEX_AUDIT_EXPORT_PATH:-}
      MULTICODEX_AUDIT_SHIP_ENABLED: ${MULTICODEX_AUDIT_SHIP_ENABLED:-false}
      MULTICODEX_AUDIT_SHIP_INTERVAL: ${MULTICODEX_AUDIT_SHIP_INTERVAL:-24h}
      MULTICODEX_AUDIT_SEAL_ROOT: ${MULTICODEX_AUDIT_SEAL_ROOT:-/var/lib/multi-codex/audit-seals/scheduled}
      MULTICODEX_AUDIT_SHIP_TARGET: ${MULTICODEX_AUDIT_SHIP_TARGET:-}
      MULTICODEX_AUDIT_SHIP_ALLOW_LEGACY_HASH_MISMATCH: ${MULTICODEX_AUDIT_SHIP_ALLOW_LEGACY_HASH_MISMATCH:-false}
      MULTICODEX_GIT_SYNC_MODE: ${MULTICODEX_GIT_SYNC_MODE:-dry-run}
      MULTICODEX_GIT_CREDENTIAL_PROVIDER: ${MULTICODEX_GIT_CREDENTIAL_PROVIDER:-env}
      MULTICODEX_GIT_CREDENTIAL_FILE_PATH: ${MULTICODEX_GIT_CREDENTIAL_FILE_PATH:-}
      MULTICODEX_GIT_VAULT_ADDR: ${MULTICODEX_GIT_VAULT_ADDR:-}
      MULTICODEX_GIT_VAULT_TOKEN: ${MULTICODEX_GIT_VAULT_TOKEN:-}
      MULTICODEX_GIT_VAULT_TOKEN_FILE: ${MULTICODEX_GIT_VAULT_TOKEN_FILE:-}
      MULTICODEX_GIT_VAULT_NAMESPACE: ${MULTICODEX_GIT_VAULT_NAMESPACE:-}
      MULTICODEX_GIT_VAULT_MOUNT: ${MULTICODEX_GIT_VAULT_MOUNT:-secret}
      MULTICODEX_GIT_VAULT_SECRET_PATH: ${MULTICODEX_GIT_VAULT_SECRET_PATH:-}
      MULTICODEX_GITHUB_API_URL: ${MULTICODEX_GITHUB_API_URL:-https://api.github.com}
      MULTICODEX_GITLAB_API_URL: ${MULTICODEX_GITLAB_API_URL:-https://gitlab.com/api/v4}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
    volumes:
      - runs:/var/lib/multi-codex/runs
    ports:
      - "8090:8090"

  worker-agentd:
    image: multi-codex/api:latest
    command: ["/usr/local/bin/multi-codex-worker-agentd"]
    environment:
      MULTICODEX_AGENTD_LISTEN: ":7070"
      MULTICODEX_AGENTD_TOKEN: ${MULTICODEX_AGENTD_TOKEN:-}
      MULTICODEX_RUN_ROOT: /var/lib/multi-codex/agentd-runs
    volumes:
      - agentd_runs:/var/lib/multi-codex/agentd-runs
    ports:
      - "7070:7070"

  web:
    image: multi-codex/web:latest
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres18_data:
  artifacts:
  runs:
  worktrees:
  repo_cache:
  audit_seals:
  agentd_runs:
