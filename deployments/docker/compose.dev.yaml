x-dev-image: &dev_image ${MULTICODEX_DEV_IMAGE:-multi-codex/dev:go1.25-node25.9-pnpm11.7}

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_codex}
      POSTGRES_USER: ${POSTGRES_USER:-multi_codex}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    ports:
      - "${MULTICODEX_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres18_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev:
    image: *dev_image
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - pnpm_store:/root/.local/share/pnpm/store
      - web_node_modules:/workspace/apps/web/node_modules
    environment:
      MULTICODEX_DATABASE_URL: ${MULTICODEX_DATABASE_URL:-postgres://${POSTGRES_USER:-multi_codex}@postgres:5432/${POSTGRES_DB:-multi_codex}?sslmode=disable}
      MULTICODEX_AUTH_MODE: ${MULTICODEX_AUTH_MODE:-local}
      MULTICODEX_AUTH_SESSION_TTL: ${MULTICODEX_AUTH_SESSION_TTL:-12h}
      MULTICODEX_AUTH_COOKIE_SECURE: ${MULTICODEX_AUTH_COOKIE_SECURE:-false}
      MULTICODEX_AUTH_LOGIN_STATE_TTL: ${MULTICODEX_AUTH_LOGIN_STATE_TTL:-10m}
      MULTICODEX_LOCAL_ADMIN_EMAIL: ${MULTICODEX_LOCAL_ADMIN_EMAIL:-local-dev@multi-codex.invalid}
      MULTICODEX_LOCAL_ADMIN_PASSWORD: ${MULTICODEX_LOCAL_ADMIN_PASSWORD:-admin123}
      MULTICODEX_OIDC_ISSUER: ${MULTICODEX_OIDC_ISSUER:-}
      MULTICODEX_OIDC_AUDIENCE: ${MULTICODEX_OIDC_AUDIENCE:-}
      MULTICODEX_OIDC_JWKS_URL: ${MULTICODEX_OIDC_JWKS_URL:-}
      MULTICODEX_OIDC_CLIENT_ID: ${MULTICODEX_OIDC_CLIENT_ID:-}
      MULTICODEX_OIDC_CLIENT_SECRET: ${MULTICODEX_OIDC_CLIENT_SECRET:-}
      MULTICODEX_OIDC_CLIENT_AUTH_METHOD: ${MULTICODEX_OIDC_CLIENT_AUTH_METHOD:-client_secret_post}
      MULTICODEX_OIDC_REDIRECT_URL: ${MULTICODEX_OIDC_REDIRECT_URL:-http://localhost:8080/api/v1/auth/callback}
      MULTICODEX_OIDC_AUTHORIZATION_URL: ${MULTICODEX_OIDC_AUTHORIZATION_URL:-}
      MULTICODEX_OIDC_TOKEN_URL: ${MULTICODEX_OIDC_TOKEN_URL:-}
      MULTICODEX_OIDC_POST_LOGIN_REDIRECT_URL: ${MULTICODEX_OIDC_POST_LOGIN_REDIRECT_URL:-/}
      MULTICODEX_OIDC_DEFAULT_ROLE: ${MULTICODEX_OIDC_DEFAULT_ROLE:-viewer}
      MULTICODEX_OIDC_DEFAULT_ORG_ID: ${MULTICODEX_OIDC_DEFAULT_ORG_ID:-}
      MULTICODEX_OIDC_GROUP_ROLE_MAP: ${MULTICODEX_OIDC_GROUP_ROLE_MAP:-}
      MULTICODEX_OIDC_GROUP_ORG_MAP: ${MULTICODEX_OIDC_GROUP_ORG_MAP:-}
      MULTICODEX_EXECUTOR_MODE: ${MULTICODEX_EXECUTOR_MODE:-mock}
      MULTICODEX_WORKER_IMAGE: ${MULTICODEX_WORKER_IMAGE:-multi-codex/codex-worker:go1.25-node-vite8}
      MULTICODEX_WORKER_DEFAULT_TIMEOUT: ${MULTICODEX_WORKER_DEFAULT_TIMEOUT:-1h}
      MULTICODEX_WORKER_CPUS: ${MULTICODEX_WORKER_CPUS:-1}
      MULTICODEX_WORKER_MEMORY: ${MULTICODEX_WORKER_MEMORY:-2g}
      MULTICODEX_WORKER_PIDS_LIMIT: ${MULTICODEX_WORKER_PIDS_LIMIT:-256}
      MULTICODEX_WORKER_READ_ONLY_ROOTFS: ${MULTICODEX_WORKER_READ_ONLY_ROOTFS:-true}
      MULTICODEX_WORKER_TMPFS_SIZE: ${MULTICODEX_WORKER_TMPFS_SIZE:-256m}
      MULTICODEX_WORKER_NO_NEW_PRIVILEGES: ${MULTICODEX_WORKER_NO_NEW_PRIVILEGES:-true}
      MULTICODEX_WORKER_CAP_DROP: ${MULTICODEX_WORKER_CAP_DROP:-ALL}
      MULTICODEX_WORKER_COMMAND_ALLOWLIST: ${MULTICODEX_WORKER_COMMAND_ALLOWLIST:-}
      MULTICODEX_WORKER_COMMAND_DENYLIST: ${MULTICODEX_WORKER_COMMAND_DENYLIST:-}
      MULTICODEX_WORKER_DOCKER_SOCKET_ENABLED: ${MULTICODEX_WORKER_DOCKER_SOCKET_ENABLED:-false}
      MULTICODEX_WORKER_DOCKER_SOCKET_BOUNDARY: ${MULTICODEX_WORKER_DOCKER_SOCKET_BOUNDARY:-}
      MULTICODEX_WORKER_SECRET_ENV_ALLOWLIST: ${MULTICODEX_WORKER_SECRET_ENV_ALLOWLIST:-}
      MULTICODEX_WORKER_SECRET_PROVIDER: ${MULTICODEX_WORKER_SECRET_PROVIDER:-env}
      MULTICODEX_WORKER_SECRET_FILE_PATH: ${MULTICODEX_WORKER_SECRET_FILE_PATH:-}
      MULTICODEX_WORKER_VAULT_ADDR: ${MULTICODEX_WORKER_VAULT_ADDR:-}
      MULTICODEX_WORKER_VAULT_TOKEN: ${MULTICODEX_WORKER_VAULT_TOKEN:-}
      MULTICODEX_WORKER_VAULT_TOKEN_FILE: ${MULTICODEX_WORKER_VAULT_TOKEN_FILE:-}
      MULTICODEX_WORKER_VAULT_NAMESPACE: ${MULTICODEX_WORKER_VAULT_NAMESPACE:-}
