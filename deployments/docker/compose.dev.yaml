      MULTICODEX_QUEUE_ENABLED: ${MULTICODEX_QUEUE_ENABLED:-true}
      MULTICODEX_QUEUE_DISPATCH_INTERVAL: ${MULTICODEX_QUEUE_DISPATCH_INTERVAL:-5s}
      MULTICODEX_TELEMETRY_PUSH_URL: ${MULTICODEX_TELEMETRY_PUSH_URL:-}
