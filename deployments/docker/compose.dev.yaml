      MULTICODEX_AUDIT_EXPORT_PATH: ${MULTICODEX_AUDIT_EXPORT_PATH:-}
      MULTICODEX_AUDIT_SHIP_ENABLED: ${MULTICODEX_AUDIT_SHIP_ENABLED:-false}
      MULTICODEX_AUDIT_SHIP_INTERVAL: ${MULTICODEX_AUDIT_SHIP_INTERVAL:-24h}
      MULTICODEX_AUDIT_SEAL_ROOT: ${MULTICODEX_AUDIT_SEAL_ROOT:-/workspace/.data/audit-seals/scheduled}
